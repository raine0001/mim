name: TOD Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  tod-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Contract Preflight Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML jsonschema

      - name: Run TOD↔MIM Contract Preflight
        run: python3 scripts/run_tod_mim_contract_preflight.py

      - name: Run TOD reliability tests and generate summary
        run: python3 scripts/run_tod_tests.py

      - name: Run Operator Incident Precedence Guard
        run: python3 scripts/run_operator_incident_precedence_guard.py

      - name: Append test history and dashboard snapshot
        run: python3 scripts/append_tod_test_history.py

      - name: Upload TOD reliability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tod-reliability-artifacts
          path: |
            tod-tests-summary.json
            tod/history/tod-tests-history.json
            tod/history/reliability-dashboard.json
